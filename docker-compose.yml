# Full stack: Postgres optional, SQLite default. Redis + worker = real RQ queue.
# On Windows hosts: either `pip install -U "rq>=2.8"` for native API+worker, or
# `docker compose up --build` / `.\run-queue-docker.ps1` for Linux containers.

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: competitor-watch-backend:latest
    environment:
      DATABASE_URL: ${DATABASE_URL:-sqlite:///./data/watch.db}
      USE_FIXTURES: ${USE_FIXTURES:-false}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:5173}
      REDIS_URL: redis://redis:6379/0
      RQ_QUEUE: scrape
      SCRAPE_USER_AGENT: ${SCRAPE_USER_AGENT:-CompetitorWatchBot/1.0 (+https://example.com/bot)}
      SCRAPE_TIMEOUT: ${SCRAPE_TIMEOUT:-30}
      SCRAPE_MAX_PAGES: ${SCRAPE_MAX_PAGES:-5}
      # Third-party scraping (optional). Set EITHER to enable.
      SCRAPERAPI_KEY: ${SCRAPERAPI_KEY:-}
      SCRAPER_PROXY_URL: ${SCRAPER_PROXY_URL:-}
      SCRAPER_RENDER_JS: ${SCRAPER_RENDER_JS:-false}
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/app/backend/data
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]

  worker:
    image: competitor-watch-backend:latest
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:-sqlite:///./data/watch.db}
      USE_FIXTURES: ${USE_FIXTURES:-false}
      REDIS_URL: redis://redis:6379/0
      RQ_QUEUE: scrape
      SCRAPE_USER_AGENT: ${SCRAPE_USER_AGENT:-CompetitorWatchBot/1.0 (+https://example.com/bot)}
      SCRAPE_TIMEOUT: ${SCRAPE_TIMEOUT:-30}
      SCRAPE_MAX_PAGES: ${SCRAPE_MAX_PAGES:-5}
      SCRAPERAPI_KEY: ${SCRAPERAPI_KEY:-}
      SCRAPER_PROXY_URL: ${SCRAPER_PROXY_URL:-}
      SCRAPER_RENDER_JS: ${SCRAPER_RENDER_JS:-false}
      PLAYWRIGHT_BROWSERS_PATH: /ms-playwright
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_started
    volumes:
      - ./backend/data:/app/backend/data
    command: ["python", "worker.py"]
    deploy:
      replicas: 2

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    depends_on:
      - api
    ports:
      - "5173:80"
